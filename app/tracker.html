<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Good Habit Tracker">
<title>Good Habit Tracker</title>
<style>
  :root {
    --bg:#0a0a0b; --card:#14141a; --card2:#1a1a22; --border:rgba(255,255,255,.08);
    --text:#ede6d6; --muted:#7a7a85; --accent:#d4a574; --plan:#c79bd9; --danger:#c97a6e;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif; }
  .shell { max-width:700px; margin:0 auto; padding:16px 14px 92px; }
  .row { display:flex; align-items:center; gap:10px; }
  .between { justify-content:space-between; }
  .col { display:flex; flex-direction:column; gap:8px; }
  .grid3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:12px; }
  .card2 { background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:10px; }
  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  .muted { color:var(--muted); }
  .title { font-size:26px; margin:8px 0 2px; }
  .stat { font-size:34px; font-weight:700; line-height:1; }
  .tabs { position:fixed; left:0; right:0; bottom:0; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:10px; background:#0b0b10; border-top:1px solid var(--border); }
  .btn,.tab { border:1px solid var(--border); background:#111119; color:var(--text); border-radius:10px; padding:8px 10px; font-size:14px; }
  .tab.active,.btn.primary { border-color:var(--accent); color:var(--accent); }
  .btn.plan { border-color:var(--plan); color:var(--plan); }
  .btn.danger { border-color:var(--danger); color:var(--danger); }
  .progress { height:8px; border-radius:999px; background:#232331; overflow:hidden; }
  .fill { height:100%; background:var(--accent); }
  .habit { cursor:pointer; }
  .pill { border:1px solid var(--border); border-radius:999px; padding:3px 10px; font-size:12px; }
  .counter { display:grid; grid-template-columns:36px 1fr 36px; gap:6px; align-items:center; margin-top:8px; }
  .center { text-align:center; }
  .toast { position:fixed; left:50%; transform:translateX(-50%); bottom:76px; background:#1c1c24; border:1px solid var(--border); border-radius:999px; padding:8px 12px; font-size:12px; }
  .hidden { display:none; }
</style>
</head>
<body>
<div id="app"></div>
<input id="restoreFile" type="file" accept=".json,application/json" style="display:none">
<div id="toast" class="toast hidden"></div>
<script>
const SYNC_URL = '/api/sync';

const state = {
  checkinsByDate: {},
  program: { cycles: [] },
  tab: 'today',
  tuneMode: 'current',
  _lastModified: 0,
  cloudReady: false,
};
let syncStatus = 'idle';
let pushTimer = null;
let toastTimer = null;

function clone(x) { return JSON.parse(JSON.stringify(x)); }
function uid(p) { return p + '_' + Math.random().toString(36).slice(2, 7) + Date.now().toString(36).slice(-4); }
function slug(s) { return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '').slice(0, 24) || uid('id'); }
function fmtDate(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
function todayKey() { return fmtDate(new Date()); }
function addDaysKey(k, n) { const d = new Date(k + 'T00:00:00'); d.setDate(d.getDate() + n); return fmtDate(d); }
function dayLabel(k) { return new Date(k + 'T12:00:00').toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' }).toUpperCase(); }
function escapeHtml(s) { return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;'); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.remove('hidden'); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.add('hidden'), 2200); }

function makeDefaultCycle(startDate) {
  const lengthDays = 14;
  return { id: uid('cycle'), startDate, endDate: addDaysKey(startDate, lengthDays - 1), lengthDays, categories: [], habitDefinitions: [] };
}
function initClean() { state.checkinsByDate = {}; state.program = { cycles: [makeDefaultCycle(addDaysKey(todayKey(), 1))] }; }
function stripLegacyRestFromCheckins() {
  for (const k of Object.keys(state.checkinsByDate)) {
    const e = state.checkinsByDate[k];
    if (e && Object.prototype.hasOwnProperty.call(e, 'isRestDay')) delete e.isRestDay;
  }
}
function sortCycles() { state.program.cycles.sort((a, b) => a.startDate.localeCompare(b.startDate)); }
function findCycleByDate(dateKey) { return state.program.cycles.find(c => c.startDate <= dateKey && dateKey <= c.endDate) || null; }

function getCurrentCycle() {
  sortCycles();
  let c = findCycleByDate(todayKey());
  if (c) return c;
  const first = state.program.cycles[0];
  if (!first) { initClean(); return state.program.cycles[0]; }
  if (todayKey() < first.startDate) return first;
  let last = state.program.cycles[state.program.cycles.length - 1];
  while (todayKey() > last.endDate) {
    const s = addDaysKey(last.endDate, 1);
    const next = { id: uid('cycle'), startDate: s, endDate: addDaysKey(s, last.lengthDays - 1), lengthDays: last.lengthDays, categories: clone(last.categories), habitDefinitions: clone(last.habitDefinitions) };
    state.program.cycles.push(next);
    last = next;
  }
  sortCycles();
  return findCycleByDate(todayKey()) || state.program.cycles[0];
}
function getUpcomingCycle() {
  const cur = getCurrentCycle();
  const nextStart = addDaysKey(cur.endDate, 1);
  let next = state.program.cycles.find(c => c.startDate === nextStart);
  if (!next) {
    next = { id: uid('cycle'), startDate: nextStart, endDate: addDaysKey(nextStart, cur.lengthDays - 1), lengthDays: cur.lengthDays, categories: clone(cur.categories), habitDefinitions: clone(cur.habitDefinitions) };
    state.program.cycles.push(next);
    sortCycles();
  }
  return next;
}
function cycleForMode() { return state.tuneMode === 'next' ? getUpcomingCycle() : getCurrentCycle(); }
function cycleInfo() {
  const cur = getCurrentCycle();
  const day = Math.max(1, Math.floor((new Date(todayKey() + 'T00:00:00') - new Date(cur.startDate + 'T00:00:00')) / 86400000) + 1);
  return { cycleNum: state.program.cycles.findIndex(x => x.id === cur.id) + 1, day, length: cur.lengthDays, daysLeft: Math.max(0, cur.lengthDays - day), cur };
}

function entryFor(dateKey) {
  const raw = state.checkinsByDate[dateKey];
  if (!raw) return { habitValuesById: {} };
  return { habitValuesById: raw.habitValuesById || {} };
}
function putEntry(dateKey, entry) { state.checkinsByDate[dateKey] = entry; }
function habitsForCategory(cycle, cid) { return (cycle.habitDefinitions || []).filter(h => h.categoryId === cid && h.enabled); }
function habitById(cycle, id) { return (cycle.habitDefinitions || []).find(h => h.id === id); }
function habitEarned(h, v) { if (!h.enabled) return 0; return h.kind === 'boolean' ? (v ? (h.scoring.points || 0) : 0) : Math.max(0, Math.min(Number(v || 0), h.scoring.maxUnits || 0)) * (h.scoring.pointsPerUnit || 0); }
function habitMax(h) { if (!h.enabled) return 0; return h.kind === 'boolean' ? (h.scoring.points || 0) : (h.scoring.maxUnits || 0) * (h.scoring.pointsPerUnit || 0); }
function categoryPoints(entry, cycle, cid) { if (!entry) return 0; return habitsForCategory(cycle, cid).reduce((s, h) => s + habitEarned(h, (entry.habitValuesById || {})[h.id]), 0); }
function categoryMax(cycle, cid) { return habitsForCategory(cycle, cid).reduce((s, h) => s + habitMax(h), 0); }
function totalPoints(entry, cycle) { return (cycle.categories || []).reduce((s, c) => s + categoryPoints(entry, cycle, c.id), 0); }
function totalMax(cycle) { return (cycle.categories || []).reduce((s, c) => s + categoryMax(cycle, c.id), 0); }

function save() {
  state._lastModified = Date.now();
  schedulePush();
}
function load() {
  initClean();
}

function csvExport() {
  const all = {};
  const ids = [];
  for (const c of state.program.cycles) for (const h of c.habitDefinitions || []) if (!all[h.id]) { all[h.id] = true; ids.push(h.id); }
  const rows = [['date'].concat(ids).concat(['total']).join(',')];
  for (const d of Object.keys(state.checkinsByDate).sort()) {
    const e = entryFor(d);
    const c = findCycleByDate(d) || getCurrentCycle();
    const row = [d];
    for (const id of ids) { const v = (e.habitValuesById || {})[id]; row.push(v == null ? '' : (typeof v === 'boolean' ? (v ? '1' : '0') : String(v))); }
    row.push(String(totalPoints(e, c)));
    rows.push(row.join(','));
  }
  downloadFile(rows.join('\n'), 'good-habit-tracker-' + todayKey() + '.csv', 'text/csv');
}
function jsonExport() { downloadFile(JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), checkinsByDate: state.checkinsByDate, program: state.program }, null, 2), 'good-habit-tracker-' + todayKey() + '.json', 'application/json'); }
function downloadFile(text, name, mime) {
  const blob = new Blob([text], { type: (mime || 'text/plain') + ';charset=utf-8' });
  const u = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = u; a.download = name; document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(u); a.remove(); }, 600);
}

function renderToday() {
  const c = getCurrentCycle();
  const e = entryFor(todayKey());
  const pts = totalPoints(e, c);
  const max = totalMax(c);
  const categories = (c.categories || []).slice().sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  return `
    <div class="card">
      <div class="row between"><div class="mono muted">TODAY</div><div class="mono muted">${dayLabel(todayKey())}</div></div>
      <div class="row between" style="margin-top:8px"><div class="stat">${pts}</div><div class="mono muted">/ ${max}</div></div>
      <div class="progress" style="margin-top:8px"><div class="fill" style="width:${max ? (pts / max) * 100 : 0}%"></div></div>
    </div>
    ${categories.length === 0 ? `<div class="card"><div class="muted" style="font-size:14px;line-height:1.45">No habits yet. Open <strong>TUNE</strong>, add categories, then add habits and point rules.</div></div>` : categories.map(cat => renderTodayCategory(c, e, cat)).join('')}
  `;
}
function renderTodayCategory(c, e, cat) {
  const habits = habitsForCategory(c, cat.id);
  const accent = cat.accent || '#d4a574';
  return `
    <div class="card">
      <div class="row between"><div class="mono" style="color:${accent}">${escapeHtml(cat.label)}</div><div class="mono muted">${categoryPoints(e, c, cat.id)} / ${categoryMax(c, cat.id)}</div></div>
      <div class="col" style="margin-top:8px">${habits.map(h => renderTodayHabit(h, e, accent)).join('')}</div>
    </div>`;
}
function renderTodayHabit(h, e, accent) {
  const v = (e.habitValuesById || {})[h.id];
  if (h.kind === 'boolean') {
    const on = !!v;
    return `<button class="card2 row between habit" data-action="toggle-habit" data-id="${h.id}"><div>${escapeHtml(h.label)}</div><div class="mono" style="color:${on ? accent : 'var(--muted)'}">${on ? '● +' + (h.scoring.points || 0) : '○ +' + (h.scoring.points || 0)}</div></button>`;
  }
  const n = Number(v || 0), maxUnits = h.scoring.maxUnits || 0, ppu = h.scoring.pointsPerUnit || 0;
  return `<div class="card2">
    <div class="row between"><div>${escapeHtml(h.label)}</div><div class="mono" style="color:${accent}">+${Math.min(n, maxUnits) * ppu} / ${maxUnits * ppu}</div></div>
    <div class="counter"><button class="btn" data-action="counter-habit" data-id="${h.id}" data-delta="-1">−</button><div class="mono center">${n}</div><button class="btn" data-action="counter-habit" data-id="${h.id}" data-delta="1">+</button></div>
  </div>`;
}

function buildLineChart(data, avg, dayMax) {
  const w = 360, h = 120, p = 4;
  const max = Math.max(dayMax, 1, ...data.map(d => d.pts));
  const dx = data.length > 1 ? (w - p * 2) / (data.length - 1) : 0;
  const y = (v) => p + (h - p * 2) * (1 - (v / max));
  const pts = data.map((d, i) => ({ x: p + i * dx, y: y(d.pts) }));
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    <line x1="${p}" y1="${y(avg).toFixed(1)}" x2="${w - p}" y2="${y(avg).toFixed(1)}" stroke="#4a4a55" stroke-dasharray="2 4"/>
    ${pts.length ? `<path d="M${pts.map(q => q.x.toFixed(1) + ',' + q.y.toFixed(1)).join(' L')}" fill="none" stroke="#d4a574" stroke-width="2"></path>` : ''}
    ${pts.map(q => `<circle cx="${q.x.toFixed(1)}" cy="${q.y.toFixed(1)}" r="2" fill="#d4a574"></circle>`).join('')}
  </svg>`;
}
function renderTrends() {
  const info = cycleInfo();
  const ptsFor = (d) => totalPoints(entryFor(d), findCycleByDate(d) || info.cur);
  const maxFor = (d) => totalMax(findCycleByDate(d) || info.cur);
  const last7 = Array.from({ length: 7 }, (_, i) => addDaysKey(todayKey(), -(6 - i)));
  const last30 = Array.from({ length: 30 }, (_, i) => addDaysKey(todayKey(), -(29 - i)));
  const week = (() => { const n = new Date(); const dow = (n.getDay() + 6) % 7; return Array.from({ length: dow + 1 }, (_, i) => addDaysKey(todayKey(), -(dow - i))); })();
  const month = (() => { const now = new Date(); return Array.from({ length: now.getDate() }, (_, i) => fmtDate(new Date(now.getFullYear(), now.getMonth(), i + 1))); })();
  const dayPts = ptsFor(todayKey()), dayMax = maxFor(todayKey());
  const weekPts = week.reduce((s, d) => s + ptsFor(d), 0), weekMax = week.reduce((s, d) => s + maxFor(d), 0);
  const monthPts = month.reduce((s, d) => s + ptsFor(d), 0), monthMax = month.reduce((s, d) => s + maxFor(d), 0);
  const avg7 = last7.reduce((s, d) => s + ptsFor(d), 0) / 7;
  return `
    <div class="grid3">
      <div class="card"><div class="mono muted">DAY</div><div class="stat" style="font-size:24px">${dayPts}</div><div class="mono muted">/ ${dayMax}</div></div>
      <div class="card"><div class="mono muted">WEEK</div><div class="stat" style="font-size:24px">${weekPts}</div><div class="mono muted">/ ${weekMax}</div></div>
      <div class="card"><div class="mono muted">MONTH</div><div class="stat" style="font-size:24px">${monthPts}</div><div class="mono muted">/ ${monthMax}</div></div>
    </div>
    <div class="card"><div class="row between"><div class="mono muted">7-DAY AVG</div><div class="mono">${avg7.toFixed(1)}</div></div><div class="mono muted" style="margin-top:8px">cycle ${info.cycleNum} · day ${info.day} of ${info.length}</div></div>
    <div class="card"><div class="mono muted" style="margin-bottom:8px">LAST 30 DAYS</div>${buildLineChart(last30.map(d => ({ date:d, pts:ptsFor(d) })), avg7, dayMax)}</div>
    <div class="card"><div class="row" style="flex-wrap:wrap"><button class="btn primary" data-action="export-json">JSON BACKUP</button><button class="btn" data-action="export-csv">CSV EXPORT</button><button class="btn" data-action="restore">RESTORE…</button></div></div>
  `;
}

function renderTune() {
  const c = cycleForMode();
  const categories = (c.categories || []).slice().sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  return `
    <div class="row" style="margin-bottom:12px">
      <button class="btn ${state.tuneMode === 'current' ? 'primary' : ''}" data-action="tune-mode" data-mode="current">CURRENT</button>
      <button class="btn ${state.tuneMode === 'next' ? 'plan' : ''}" data-action="tune-mode" data-mode="next">PLAN NEXT</button>
    </div>
    <div class="card"><div class="row between"><div class="mono muted">${state.tuneMode === 'next' ? 'UPCOMING CYCLE' : 'CURRENT CYCLE'}</div><div class="mono">${totalMax(c)} pts</div></div>
      <div class="row between" style="margin-top:8px"><div class="mono muted">length ${c.lengthDays}d</div><div class="row"><button class="btn" data-action="cycle-len" data-delta="-7">−7</button><button class="btn" data-action="cycle-len" data-delta="7">+7</button></div></div>
    </div>
    <div class="card"><button class="btn" data-action="add-category">+ CATEGORY</button></div>
    ${categories.map(cat => renderTuneCategory(c, cat)).join('')}
    ${state.tuneMode === 'current' ? `<div class="card"><button class="btn danger" data-action="reset-confirm">Reset all data</button></div>` : ''}
  `;
}
function renderTuneCategory(c, cat) {
  const habits = (c.habitDefinitions || []).filter(h => h.categoryId === cat.id);
  return `<div class="card">
    <div class="row between">
      <div class="mono">${escapeHtml(cat.label)}</div>
      <div class="row"><button class="btn" data-action="rename-category" data-id="${cat.id}">Rename</button><button class="btn" data-action="add-habit" data-id="${cat.id}">+ Habit</button><button class="btn danger" data-action="remove-category" data-id="${cat.id}">Remove</button></div>
    </div>
    <div class="col" style="margin-top:8px">${habits.map(h => renderTuneHabit(h)).join('')}</div>
  </div>`;
}
function renderTuneHabit(h) {
  const scoreLabel = h.kind === 'boolean' ? (h.scoring.points || 0) + ' pt' : (h.scoring.pointsPerUnit || 0) + '/unit cap ' + (h.scoring.maxUnits || 0);
  return `<div class="card2">
    <div class="row between"><div>${escapeHtml(h.label)}</div><div class="row"><button class="btn" data-action="rename-habit" data-id="${h.id}">Rename</button><button class="btn" data-action="switch-kind" data-id="${h.id}">${h.kind}</button><button class="btn danger" data-action="remove-habit" data-id="${h.id}">Remove</button></div></div>
    <div class="row between" style="margin-top:8px"><button class="btn" data-action="toggle-enabled" data-id="${h.id}">${h.enabled ? 'ON' : 'OFF'}</button><div class="mono muted">${scoreLabel}</div></div>
    <div class="row" style="margin-top:8px">
      ${h.kind === 'boolean'
        ? `<button class="btn" data-action="score-edit" data-id="${h.id}" data-field="points" data-delta="-1">−</button><button class="btn" data-action="score-edit" data-id="${h.id}" data-field="points" data-delta="1">+ points</button>`
        : `<button class="btn" data-action="score-edit" data-id="${h.id}" data-field="pointsPerUnit" data-delta="-1">− p/u</button><button class="btn" data-action="score-edit" data-id="${h.id}" data-field="pointsPerUnit" data-delta="1">+ p/u</button><button class="btn" data-action="score-edit" data-id="${h.id}" data-field="maxUnits" data-delta="-1">− cap</button><button class="btn" data-action="score-edit" data-id="${h.id}" data-field="maxUnits" data-delta="1">+ cap</button>`
      }
    </div>
  </div>`;
}

function render() {
  if (!state.cloudReady) {
    document.getElementById('app').innerHTML = `
      <div class="shell">
        <div class="card">
          <div class="mono muted">GOOD HABIT TRACKER</div>
          <div style="margin-top:10px; font-size:16px">Connecting to cloud data…</div>
          <div class="muted" style="margin-top:8px; font-size:13px">This app is cloud-first and does not use local storage.</div>
        </div>
      </div>`;
    return;
  }
  const info = cycleInfo();
  const cloud = syncStatus === 'ok' ? 'cloud ✓' : (syncStatus === 'error' ? 'cloud ✗' : (syncStatus === 'syncing' ? 'cloud …' : 'cloud'));
  document.getElementById('app').innerHTML = `
    <div class="shell">
      <div class="row between"><div><div class="mono muted">CYCLE ${info.cycleNum} · DAY ${info.day}/${info.length}</div><div class="title">Good Habit Tracker</div></div><div class="pill mono">${cloud}</div></div>
      ${state.tab === 'today' ? renderToday() : state.tab === 'trends' ? renderTrends() : renderTune()}
    </div>
    <nav class="tabs">
      <button class="tab ${state.tab === 'today' ? 'active' : ''}" data-action="tab" data-tab="today">TODAY</button>
      <button class="tab ${state.tab === 'trends' ? 'active' : ''}" data-action="tab" data-tab="trends">TRENDS</button>
      <button class="tab ${state.tab === 'tune' ? 'active' : ''}" data-action="tab" data-tab="tune">TUNE</button>
    </nav>`;
}

document.body.addEventListener('click', (e) => {
  if (!state.cloudReady) return;
  const t = e.target.closest('[data-action]');
  if (!t) return;
  const action = t.dataset.action;
  const id = t.dataset.id;
  const delta = parseInt(t.dataset.delta || '0', 10);

  if (action === 'tab') { state.tab = t.dataset.tab; render(); return; }
  if (action === 'tune-mode') { state.tuneMode = t.dataset.mode; save(); render(); return; }
  if (action === 'export-csv') { csvExport(); return; }
  if (action === 'export-json') { jsonExport(); return; }
  if (action === 'restore') { document.getElementById('restoreFile').click(); return; }
  if (action === 'reset-confirm') { initClean(); save(); render(); showToast('All data reset'); return; }

  const curCycle = getCurrentCycle();
  const todayHabit = habitById(curCycle, id);
  if (action === 'toggle-habit' && todayHabit && todayHabit.kind === 'boolean') { const entry = entryFor(todayKey()); entry.habitValuesById[id] = !entry.habitValuesById[id]; putEntry(todayKey(), entry); save(); render(); return; }
  if (action === 'counter-habit' && todayHabit && todayHabit.kind === 'count') { const entry = entryFor(todayKey()); const cur = Number(entry.habitValuesById[id] || 0); entry.habitValuesById[id] = Math.max(0, Math.min(cur + delta, todayHabit.scoring.maxUnits || 0)); putEntry(todayKey(), entry); save(); render(); return; }

  const cycle = cycleForMode();
  if (action === 'cycle-len') { cycle.lengthDays = Math.max(7, cycle.lengthDays + delta); cycle.endDate = addDaysKey(cycle.startDate, cycle.lengthDays - 1); if (state.tuneMode === 'current') { const n = getUpcomingCycle(); n.startDate = addDaysKey(cycle.endDate, 1); n.endDate = addDaysKey(n.startDate, n.lengthDays - 1); } save(); render(); return; }
  if (action === 'add-category') { const label = prompt('New category name'); if (!label) return; const cid = slug(label); if (cycle.categories.some(c => c.id === cid)) { showToast('Category exists'); return; } cycle.categories.push({ id: cid, label: label.trim().toUpperCase(), sortOrder: cycle.categories.length + 1, accent: '#d4a574' }); save(); render(); return; }
  if (action === 'rename-category') { const c = cycle.categories.find(x => x.id === id); if (!c) return; const next = prompt('Category name', c.label); if (!next) return; c.label = next.trim().toUpperCase(); save(); render(); return; }
  if (action === 'remove-category') { if (cycle.habitDefinitions.some(h => h.categoryId === id)) { showToast('Remove habits first'); return; } cycle.categories = cycle.categories.filter(c => c.id !== id); save(); render(); return; }
  if (action === 'add-habit') { const label = prompt('Habit label'); if (!label) return; const kind = (prompt('Type: boolean or count', 'boolean') || 'boolean').toLowerCase(); cycle.habitDefinitions.push({ id: slug(label + '_' + Date.now().toString().slice(-4)), categoryId: id, label: label.trim(), kind: kind === 'count' ? 'count' : 'boolean', enabled: true, scoring: kind === 'count' ? { pointsPerUnit: 1, maxUnits: 4 } : { points: 1 } }); save(); render(); return; }
  if (action === 'remove-habit') { cycle.habitDefinitions = cycle.habitDefinitions.filter(h => h.id !== id); save(); render(); return; }
  if (action === 'rename-habit') { const h = cycle.habitDefinitions.find(x => x.id === id); if (!h) return; const next = prompt('Habit label', h.label); if (!next) return; h.label = next.trim(); save(); render(); return; }
  if (action === 'switch-kind') { const h = cycle.habitDefinitions.find(x => x.id === id); if (!h) return; if (h.kind === 'boolean') { h.kind = 'count'; h.scoring = { pointsPerUnit: Math.max(1, h.scoring.points || 1), maxUnits: 4 }; } else { h.kind = 'boolean'; h.scoring = { points: Math.max(1, h.scoring.pointsPerUnit || 1) }; } save(); render(); return; }
  if (action === 'toggle-enabled') { const h = cycle.habitDefinitions.find(x => x.id === id); if (!h) return; h.enabled = !h.enabled; save(); render(); return; }
  if (action === 'score-edit') {
    const h = cycle.habitDefinitions.find(x => x.id === id); if (!h) return;
    const f = t.dataset.field;
    if (h.kind === 'boolean' && f === 'points') h.scoring.points = Math.max(0, (h.scoring.points || 0) + delta);
    if (h.kind === 'count' && f === 'pointsPerUnit') h.scoring.pointsPerUnit = Math.max(0, (h.scoring.pointsPerUnit || 0) + delta);
    if (h.kind === 'count' && f === 'maxUnits') h.scoring.maxUnits = Math.max(0, (h.scoring.maxUnits || 0) + delta);
    save(); render(); return;
  }
});

document.getElementById('restoreFile').addEventListener('change', (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = (ev) => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!d.program || !Array.isArray(d.program.cycles)) throw new Error('bad');
      state.checkinsByDate = d.checkinsByDate || {};
      state.program = d.program;
      sortCycles();
      stripLegacyRestFromCheckins();
      save(); render();
      showToast('Restored');
    } catch (_) { showToast('Invalid backup'); }
  };
  r.readAsText(f);
  e.target.value = '';
});

function schedulePush() {
  clearTimeout(pushTimer);
  pushTimer = setTimeout(async () => {
    syncStatus = 'syncing';
    try {
      const res = await fetch(SYNC_URL, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ checkinsByDate: state.checkinsByDate, program: state.program, _lastModified: state._lastModified }),
      });
      syncStatus = res.ok ? 'ok' : 'error';
    } catch (_) { syncStatus = 'error'; }
    render();
  }, 1500);
}
async function syncFromCloud() {
  try {
    const res = await fetch(SYNC_URL, { credentials: 'same-origin' });
    if (!res.ok) {
      syncStatus = 'error';
      document.getElementById('app').innerHTML = `
        <div class="shell">
          <div class="card">
            <div class="mono muted">GOOD HABIT TRACKER</div>
            <div style="margin-top:10px; font-size:16px">Cloud unavailable</div>
            <div class="muted" style="margin-top:8px; font-size:13px">Cannot load data from /api/sync right now.</div>
            <div style="margin-top:10px"><button class="btn primary" onclick="syncFromCloud()">Retry</button></div>
          </div>
        </div>`;
      return;
    }
    const cloud = await res.json();
    if (!cloud) {
      syncStatus = 'ok';
      state.cloudReady = true;
      save();
      render();
      return;
    }
    if (cloud.program && Array.isArray(cloud.program.cycles)) {
      state.checkinsByDate = cloud.checkinsByDate || {};
      state.program = cloud.program;
      state._lastModified = cloud._lastModified || 0;
      sortCycles();
      stripLegacyRestFromCheckins();
      render();
    }
    syncStatus = 'ok';
    state.cloudReady = true;
    save();
    render();
  } catch (_) {
    syncStatus = 'error';
    document.getElementById('app').innerHTML = `
      <div class="shell">
        <div class="card">
          <div class="mono muted">GOOD HABIT TRACKER</div>
          <div style="margin-top:10px; font-size:16px">Cloud unavailable</div>
          <div class="muted" style="margin-top:8px; font-size:13px">Network error while loading /api/sync.</div>
          <div style="margin-top:10px"><button class="btn primary" onclick="syncFromCloud()">Retry</button></div>
        </div>
      </div>`;
  }
}

load();
render();
syncFromCloud();
</script>
